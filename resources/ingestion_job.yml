resources:
  jobs:
    ingestion_job:
      name: cryptosentinel_ingestion
      tasks:
        - task_key: coingecko_ingest
          spark_python_task:
            python_file: ../src/ingestion/coingecko.py
          environment_key: default

        - task_key: binance_ingest
          spark_python_task:
            python_file: ../src/ingestion/binance.py
          environment_key: default

        - task_key: fred_ingest
          spark_python_task:
            python_file: ../src/ingestion/fred.py
          environment_key: default
          depends_on:
            - task_key: coingecko_ingest

      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - requests
              - pandas
