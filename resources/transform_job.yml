resources:
  jobs:
    transform_job:
      name: cryptosentinel_transform
      tasks:
        - task_key: silver_transform
          spark_python_task:
            python_file: ../src/transforms/silver.py
          environment_key: default

        - task_key: gold_transform
          depends_on:
            - task_key: silver_transform
          spark_python_task:
            python_file: ../src/transforms/gold.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "2"
            dependencies:
              - pandas
